volatility:
  title: "변동성"
  short: "선택한 구간의 수익률 변동 폭입니다. CMVA는 시장 상태를 설명하는 데 사용하며 가격 방향을 예측하지 않습니다."
  formula: "sqrt(mean(r_i^2))"
  details_url: "/methodology#volatility"
realized_volatility:
  title: "실현 변동성"
  short: "최근 기간의 닫힌 캔들 수익률에서 관측된 표준편차입니다."
  formula: "sqrt(mean(r_i^2))"
  details_url: "/methodology#realized-volatility"
ewma:
  title: "EWMA 변동성"
  short: "최근 닫힌 캔들 수익률에 더 큰 가중치를 주는 변동성 추정치입니다."
  formula: "sqrt(EWMA(r_t^2))"
  details_url: "/methodology#ewma"
garch_forecast:
  title: "GARCH 예측 변동성"
  short: "다음 캔들 수익률의 조건부 표준편차 예측입니다. 가격 방향 예측이 아닙니다."
  formula: "sigma_{t+1|t}"
  details_url: "/methodology#garch"
range_volatility:
  title: "범위 기반 변동성"
  short: "각 캔들의 고가-저가 범위에서 계산한 변동성 추정치입니다."
  formula: "sqrt(log(H/L)^2 / (4 log 2))"
  details_url: "/methodology#range-volatility"
standardized_residual:
  title: "표준화 잔차"
  short: "수익률이 관측되기 전에 사용할 수 있었던 변동성 예측으로 수익률을 나눈 값입니다."
  formula: "r_t / sigma_{t|t-1}"
  details_url: "/methodology#standardized-residual"
shock_score:
  title: "쇼크 점수"
  short: "최신 수익률이 직전 변동성 예측에 비해 얼마나 큰지를 나타냅니다."
  formula: "|r_t| / sigma_{t|t-1}"
  details_url: "/methodology#shock"
shock_breadth:
  title: "쇼크 폭"
  short: "같은 캔들에서 비정상적으로 큰 수익률을 보인 추적 심볼의 비율입니다."
  formula: "count(|r_i|/vol_i > threshold) / N"
  details_url: "/methodology#shock"
average_correlation:
  title: "평균 쌍별 상관"
  short: "심볼 수익률 쌍의 롤링 상관 평균입니다. 값이 높을수록 자산들이 함께 움직입니다."
  formula: "mean(corr(r_i, r_j))"
  details_url: "/methodology#correlation"
pca1_share:
  title: "PCA1 설명분산 비중"
  short: "첫 번째 공통 요인이 설명하는 수익률 분산의 비중입니다. 값이 높을수록 공통 위험 구조가 강합니다."
  formula: "lambda_1 / sum(lambda_i)"
  details_url: "/methodology#pca"
dispersion:
  title: "횡단면 분산도"
  short: "현재 시장 구간에서 심볼별 수익률이 서로 얼마나 다른지를 나타냅니다."
  formula: "std_i(r_{i,t})"
  details_url: "/methodology#dispersion"
rolling_beta:
  title: "롤링 BTC 베타"
  short: "롤링 구간에서 각 심볼 수익률이 BTC 수익률에 반응하는 민감도입니다."
  formula: "cov(r_i, r_BTC) / var(r_BTC)"
  details_url: "/methodology#beta"
trend_slope:
  title: "추세 기울기"
  short: "로그 가격의 롤링 OLS 기울기입니다. 경로 방향을 설명하며 매수/매도 신호가 아닙니다."
  formula: "OLS(log_price ~ time)"
  details_url: "/methodology#trend"
trend_tstat:
  title: "추세 t-통계량"
  short: "추세 기울기를 표준오차로 나눈 값이며 진단용 신뢰 척도로 사용합니다."
  formula: "slope / SE(slope)"
  details_url: "/methodology#trend"
qlike:
  title: "QLIKE"
  short: "분산 예측 손실 지표입니다. 값이 낮을수록 변동성 예측 적합이 더 좋습니다."
  formula: "r_t^2 / h_t + log(h_t)"
  details_url: "/methodology#validation"
rmse:
  title: "RMSE"
  short: "실현 분산과 예측 분산 차이의 평균제곱근 오차입니다."
  formula: "sqrt(mean((r_t^2 - h_t)^2))"
  details_url: "/methodology#validation"
mae:
  title: "MAE"
  short: "실현 분산과 예측 분산 차이의 평균절대오차입니다."
  formula: "mean(|r_t^2 - h_t|)"
  details_url: "/methodology#validation"
ljung_box:
  title: "Ljung-Box"
  short: "잔차 자기상관 진단입니다. 모델이 시계열 의존성을 남겼는지 확인합니다."
  formula: "Q = n(n+2) sum rho_k^2/(n-k)"
  details_url: "/methodology#diagnostics"
kupiec:
  title: "Kupiec 커버리지"
  short: "변동성 예측 기반 VaR 예외율 진단입니다. 투자 증거로 해석하지 않습니다."
  formula: "LR_uc = -2 log(L0/L1)"
  details_url: "/methodology#diagnostics"
walk_forward:
  title: "워크포워드 검증"
  short: "시간 순서를 유지해 예측을 이후 닫힌 캔들 결과와만 비교합니다."
  formula: "forecast_{t|t-1} vs r_t"
  details_url: "/methodology#validation"
lookahead_bias:
  title: "룩어헤드 편향"
  short: "미래 정보가 과거 예측이나 라벨에 섞이는 검증 오류입니다."
  formula: "features_t use data <= t"
  details_url: "/methodology#lookahead"
closed_candle:
  title: "닫힌 캔들"
  short: "완료된 Binance kline입니다. CMVA는 WebSocket x 플래그가 true인 캔들만 저장하고 분석합니다."
  formula: "kline.x == true"
  details_url: "/methodology#closed-candle"
symbols:
  title: "심볼 U"
  short: "닫힌 캔들 데이터셋과 모델 평가에 포함되는 Binance Spot 심볼입니다."
  formula: "U = {symbol_1, ..., symbol_n}"
  details_url: "/methodology#data-pipeline"
analysis_period:
  title: "분석 기간 T"
  short: "부트스트랩과 롤링 평가에 요청하는 과거 조회 기간입니다."
  formula: "t in [now - T, now]"
  details_url: "/methodology#data-pipeline"
training_window:
  title: "학습 구간 S"
  short: "각 롤링 origin에서 후보 모델을 적합할 때 사용하는 후행 기간입니다."
  formula: "fit sample = candles[t-S, t]"
  details_url: "/methodology#validation"
forecast_horizon:
  title: "예측 horizon H"
  short: "예측 origin과 실현 변동성 대상 사이의 선택 간격 기준 bar 수입니다."
  formula: "forecast_t -> realized_{t+H}"
  details_url: "/methodology#validation"
refit_stride:
  title: "재적합 간격 R"
  short: "모델 평가 중 롤링 origin 사이의 bar 수입니다."
  formula: "origin_i = origin_{i-1} + R"
  details_url: "/methodology#validation"
two_stage_search:
  title: "2단계 탐색"
  short: "1단계에서 활성 후보를 빠르게 스캔하고, 2단계에서 상위 후보를 더 자세히 재평가합니다."
  formula: "rank = f(IC, loss, convergence, stability)"
  details_url: "/methodology#validation"
candidate_count:
  title: "후보 모델 수"
  short: "모델 실험실 실행에서 활성화되는 모델 명세의 최대 개수입니다."
  formula: "|C|"
  details_url: "/methodology#models"
candidate_groups:
  title: "후보 모델 그룹"
  short: "스캔에 포함되는 모델 계열입니다. 평균, 추세, 변동성, 평균-변동성 결합 후보를 포함합니다."
  formula: "C = C_mean ∪ C_trend ∪ C_vol ∪ C_combined"
  details_url: "/methodology#models"
target_view:
  title: "대상 뷰"
  short: "모델 진단을 로그 수익률, 로그 가격, 또는 둘 다에 대해 보여줄지 결정합니다."
  formula: "log(C_t) or log(C_t/C_{t-1})"
  details_url: "/methodology#models"
log_return:
  title: "로그 수익률"
  short: "수익률 대상 모델 진단에 사용하는 닫힌 캔들 로그 가격 변화입니다."
  formula: "r_t = log(C_t / C_{t-1})"
  details_url: "/methodology#models"
log_price:
  title: "로그 가격"
  short: "레벨 대상 모델 진단에 사용하는 바스켓 종가의 자연로그입니다."
  formula: "p_t = log(C_t)"
  details_url: "/methodology#models"
rolling_origin:
  title: "롤링 origin"
  short: "이전 닫힌 캔들만 사용해 후보를 적합하고 이후 결과로 평가하는 기준 시각입니다."
  formula: "train <= t, test = t + H"
  details_url: "/methodology#validation"
fit_time:
  title: "적합 시간"
  short: "모델 후보를 적합하고 평가하는 데 걸린 실제 시간입니다."
  formula: "ms(end - start)"
  details_url: "/methodology#models"
cpp_backend:
  title: "C++ 백엔드"
  short: "cmva_cpp를 불러올 수 있으면 네이티브 수치 커널을 사용하고, 아니면 Python 기준 구현을 사용합니다."
  formula: "backend = cmva_cpp else PythonBackend"
  details_url: "/methodology#cpp"
model_job:
  title: "모델 작업"
  short: "대기 중인 작업과 완료된 적합 수를 포함한 현재 롤링 모델 실험실 계산 상태입니다."
  formula: "job = stage1 + stage2"
  details_url: "/methodology#models"
model_cache:
  title: "모델 캐시"
  short: "설정과 닫힌 캔들 데이터 해시를 키로 모델 실험실 결과를 재사용합니다."
  formula: "hash(config, closed_data)"
  details_url: "/methodology#models"
model_candidate:
  title: "모델 후보"
  short: "닫힌 캔들 수익률 또는 로그 가격 진단에서 평가되는 통계 모델 명세입니다."
  formula: "candidate_id = family + order + target"
  details_url: "/methodology#models"
seasonality:
  title: "계절성 근거"
  short: "계절 차분 또는 계절 추세 후보에서 얻는 진단 신호입니다."
  formula: "x_t - x_{t-s}"
  details_url: "/methodology#trend"
arch_lm:
  title: "ARCH-LM"
  short: "제곱 잔차의 자기상관을 기반으로 변동성 군집성을 진단합니다."
  formula: "nR^2 from eps_t^2 ~ eps_{t-1}^2 ... eps_{t-k}^2"
  details_url: "/methodology#diagnostics"
model_uncertainty:
  title: "모델 불확실성"
  short: "롤링 평가 이후 상위 모델 순위가 얼마나 가까운지를 나타냅니다."
  formula: "gap(rank_score_2 - rank_score_1)"
  details_url: "/methodology#models"
regime_label:
  title: "레짐 라벨"
  short: "닫힌 캔들의 변동성, 추세, 상관, 분산도 특징에서 도출한 현재 시장 상태 분류입니다."
  formula: "label_t = f(features_{<=t})"
  details_url: "/methodology#regime"
forming_candle:
  title: "형성 중 캔들"
  short: "현재 진행 중인 Binance kline입니다. CMVA는 표시할 수 있지만 닫히기 전까지 저장과 연구 계산에서 제외합니다."
  formula: "kline.x == false"
  details_url: "/methodology#closed-candle"
simulation_t:
  title: "T"
  short: "각 origin에서 모델을 적합할 때 사용하는 과거 학습 구간입니다. 선택한 캔들 간격에 맞춰 bar 수로 변환됩니다."
  formula: "train window = [t_k - T, t_k]"
  details_url: "/methodology#validation"
simulation_dt:
  title: "dT"
  short: "시뮬레이션 origin 사이의 간격입니다. 각 dT마다 후보 모델을 다시 평가하고 점수를 저장합니다."
  formula: "t_k = data_start + T + k dT"
  details_url: "/methodology#validation"
simulation_s:
  title: "S"
  short: "S는 시뮬레이션의 스케일/시나리오/초기조건을 나타내는 필수 입력값입니다. 현재 선택한 S 역할에 따라 해석됩니다."
  formula: "S role ∈ {시나리오 수, 초기 스케일, 시뮬레이션 구간, 사용자 정의}"
  details_url: "/methodology#validation"
bootstrap_progress:
  title: "부트스트랩 진행"
  short: "로컬 캔들 로드, 누락 Binance Spot 이력 조회, 닫힌 캔들 저장, 분석 재계산의 현재 단계입니다."
  formula: "closed REST klines + selected interval"
  details_url: "/methodology#data-pipeline"
validation_issue:
  title: "데이터 검증 이슈"
  short: "분석을 해석하기 전에 감지한 연속성, 중복, OHLC, 거래량, 커버리지, 닫힌 캔들 원칙 관련 이슈입니다."
  formula: "validate(candles)"
  details_url: "/methodology#data-pipeline"
